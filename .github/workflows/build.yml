---
name: Build
'on':
  push:
    branches:
    - main
  pull_request:
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - uses: actions/setup-go@v7
      with:
        go-version: stable
    - name: Install policy-bot
      run: go install github.com/palantir/policy-bot@latest
    - name: Validate policy-bot
      run: policy-bot validate -p policy.yml
